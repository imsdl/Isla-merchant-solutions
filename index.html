<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isla Merchant Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
 /* FIX VISUAL ROJO - MEJOR CONTRASTE */
h1 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
}

.btn-primary {
  background: var(--accent);
  color: white;
  font-weight: 700;
  letter-spacing: 0.06em;
  box-shadow: 0 10px 30px rgba(232,25,44,0.25);
  transition: all 0.2s ease;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 40px rgba(232,25,44,0.45);
}

.hero-tag {
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

nav {
  border-bottom: 1px solid rgba(232,25,44,0.25);
}

.hero::before {
  background: radial-gradient(
    ellipse 60% 60% at 75% 45%,
    rgba(232,25,44,0.18) 0%,
    transparent 70%
  );
} 
 *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --black: #0a0a0a;
    --white: #f5f4f0;
    --accent: #e8192c;
    --mid: #141414;
    --border: rgba(245,244,240,0.1);
    --wa: #e8192c;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* WHATSAPP FLOAT */
  .wa-float {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 999;
    background: var(--wa);
    color: #fff;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 28px rgba(232,25,44,0.45);
    text-decoration: none;
    animation: waPulse 2.5s infinite;
    transition: transform 0.2s;
  }

  .wa-float:hover { transform: scale(1.1); }

  .wa-float svg { width: 30px; height: 30px; fill: white; }

  @keyframes waPulse {
    0%,100% { box-shadow: 0 6px 28px rgba(232,25,44,0.45); }
    50% { box-shadow: 0 6px 40px rgba(232,25,44,0.75); }
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.1rem 3rem;
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .nav-logo span { color: var(--accent); }

  .nav-bar {
    width: 3px;
    height: 1.4rem;
    background: var(--accent);
    border-radius: 2px;
  }

  .nav-cta {
    background: var(--accent);
    color: var(--white);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.55rem 1.4rem;
    border-radius: 100px;
    text-decoration: none;
  }

  .nav-cta:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(232,25,44,0.35);
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 9rem 3rem 5rem;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 55% 55% at 75% 45%, rgba(232,25,44,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-tag {
    color: var(--accent);
    margin-bottom: 1.8rem;
  }

  h1 em { color: var(--accent); font-style: normal; }

  .hero-sub {
    color: rgba(245,244,240,0.55);
  }

  .btn-primary {
    background: var(--accent);
    color: var(--white);
    padding: 1rem 2.2rem;
    border-radius: 100px;
    text-decoration: none;
  }

  .btn-primary:hover {
    box-shadow: 0 12px 32px rgba(232,25,44,0.4);
  }

  .hook-strip {
    background: var(--accent);
  }

  .section-label {
    color: var(--accent);
  }

  .features {
    background: var(--mid);
  }

  .feat-card:hover {
    background: rgba(232,25,44,0.06);
  }

  .feat-icon {
    background: rgba(232,25,44,0.12);
  }

  .logo-cell:hover {
    background: rgba(232,25,44,0.1);
  }

  .btn-wa {
    background: var(--wa);
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(28px); }
    to { opacity:1; transform:translateY(0); }
  }

</style>
</head>

<body>

<a class="wa-float" href="https://wa.me/17875460205" target="_blank">💬</a>

<nav>
  <div class="nav-logo"><div class="nav-bar"></div>Isla <span>Merchant</span> Solutions</div>
  <a href="#contacto" class="nav-cta">Habla con nosotros</a>
</nav>

<div class="hero">
  <div class="hero-tag">Soluciones de pago · Puerto Rico & USA</div>
  <h1>Tu negocio cobra <em>mejor.</em> Desde hoy.</h1>
  <p class="hero-sub">Más de 1,000 negocios confían en nosotros.</p>
  <a class="btn-primary" href="#contacto">Comenzar ahora</a>
</div>

<section id="contacto">
  <h2>Contacto</h2>
</section>

</body>
</html>
